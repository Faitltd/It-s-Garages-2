version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels: ["dependencies", "security"]
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels: ["dependencies", "security"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "security"]

